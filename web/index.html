<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Family Investment Portfolio - Cross-platform portfolio manager with Yandex.Disk sync">
  
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Family Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <!-- Title -->
  <title>Family Portfolio</title>
  
  <!-- Styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0F172A;
    }
    
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0F172A;
      z-index: 9999;
    }
    
    #loading .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(16, 185, 129, 0.3);
      border-top-color: #10B981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    #loading .logo {
      margin-bottom: 24px;
      font-size: 64px;
    }
    
    #loading .title {
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 24px;
      font-weight: bold;
      margin-top: 16px;
    }
    
    #loading .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin-top: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = null;
  </script>
  
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <!-- Loading indicator -->
  <div id="loading">
    <div class="logo">💼</div>
    <div class="spinner"></div>
    <div class="title">Family Portfolio</div>
    <div class="subtitle">Loading your portfolio...</div>
  </div>
  
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp().then(function() {
              // Hide loading indicator
              document.getElementById('loading').style.display = 'none';
            });
          });
        }
      });
    });
  </script>
</body>
</html>
