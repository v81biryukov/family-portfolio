name: family_portfolio
version: 1.0.0+1
publish_to: none
description: Family Investment Portfolio with Yandex.Disk cloud sync

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.1
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.0
  
  # OAuth
  oauth2: ^2.0.2
  flutter_web_auth: ^0.5.0
  
  # Storage & Encryption
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  encrypt: ^5.0.1
  crypto: ^3.0.3
  
  # Biometric Auth
  local_auth: ^2.1.8
  
  # UI Components
  flutter_screenutil: ^5.9.0
  fl_chart: ^0.66.0
  intl: ^0.18.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  
  # Utilities
  uuid: ^4.2.1
  path_provider: ^2.1.1
  connectivity_plus: ^5.0.2
  
  # Platform specific
  universal_platform: ^1.0.0+1
  url_launcher: ^6.2.2
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
